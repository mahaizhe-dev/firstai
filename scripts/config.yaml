ai_news:
  max_items: 20
  sources:
    - name: "36氪"
      url: "https://36kr.com/feed"
      category: "ai-news"
    - name: "少数派"
      url: "https://sspai.com/feed"
      category: "ai-news"
    - name: "Hacker News"
      url: "https://hnrss.org/newest?q=AI+OR+LLM+OR+GPT+OR+machine+learning"
      category: "ai-news"
    - name: "The Verge AI"
      url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
      category: "ai-news"
    - name: "TechCrunch AI"
      url: "https://techcrunch.com/category/artificial-intelligence/feed/"
      category: "ai-news"

world_news:
  max_items: 30
  sources:
    - name: "BBC中文"
      url: "https://feeds.bbci.co.uk/zhongwen/simp/rss.xml"
      category: "world-news"
    - name: "联合早报"
      url: "https://www.zaobao.com/rss/realtime/world"
      category: "world-news"
    - name: "纽约时报中文"
      url: "https://cn.nytimes.com/rss/"
      category: "world-news"
    - name: "Reuters"
      url: "https://www.reutersagency.com/feed/?taxonomy=best-sectors&post_type=best"
      category: "world-news"
  regions:
    - "俄乌战争"
    - "中东战争"
    - "中国外交"
    - "综合"

history_news:
  max_items: 15
  sources:
    - name: "Archaeology Magazine"
      url: "https://www.archaeology.org/feed"
      category: "history-news"
    - name: "Live Science"
      url: "https://www.livescience.com/feeds/all"
      category: "history-news"
    - name: "Hacker News"
      url: "https://hnrss.org/newest?q=archaeology+OR+ancient+OR+historical+discovery"
      category: "history-news"
    - name: "Science Daily"
      url: "https://www.sciencedaily.com/rss/top/science.xml"
      category: "history-news"

ai:
  provider: "deepseek"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  max_summary_length: 200
  language: "zh-CN"
  # 如需切换其他兼容 OpenAI 格式的 API，修改 provider / base_url / model 即可
  # 例如 OpenAI:
  #   provider: "openai"
  #   base_url: "https://api.openai.com/v1"
  #   model: "gpt-4o-mini"
  # 例如 Moonshot (月之暗面):
  #   provider: "moonshot"
  #   base_url: "https://api.moonshot.cn/v1"
  #   model: "moonshot-v1-8k"
  # 例如 Zhipu (智谱):
  #   provider: "zhipu"
  #   base_url: "https://open.bigmodel.cn/api/paas/v4"
  #   model: "glm-4-flash"

cleanup:
  max_age_days: 7
  protected_dirs:
    - "ai-tutorials"
